name: Build MusicHUD


on:

 workflow_dispatch:

 push:

  branches:
   - main



jobs:


 build:


  runs-on: windows-latest



  steps:


  - name: Checkout

    uses: actions/checkout@v4



  - name: Setup .NET

    uses: actions/setup-dotnet@v4

    with:

     dotnet-version: 8.0.x



  - name: Restore

    run:

     dotnet restore



  - name: Publish EXE

    run:

     dotnet publish
     -c Release
     -r win-x64
     --self-contained true
     -p:PublishSingleFile=true



  - name: Upload

    uses: actions/upload-artifact@v4

    with:


     name:
      MusicHUD


     path:

      **/publish/*.exe
